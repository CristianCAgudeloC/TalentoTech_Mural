<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora · Talento Tech</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">

<style>
:root {
  /* Brand */
  --primary: #1c0b3b;
  --primary-light: #2d1457;
  --primary-deep: #0a0418;
  --secondary: #00d8d9;
  --secondary-dim: #00a8a9;
  --secondary-soft: rgba(0, 216, 217, 0.1);
  --secondary-border: rgba(0, 216, 217, 0.35);

  /* Tema claro (respeta el #efefef pedido por Angie) */
  --bg: #efefef;
  --surface: #ffffff;                    /* tarjetas blancas */
  --surface-hover: #fafafa;
  --surface-deep: #f5f5f5;               /* bg de placeholders/media-wrap */
  --surface-border: rgba(28, 11, 59, 0.08);

  /* Texto sobre tema claro */
  --text: #1c0b3b;                        /* títulos y nombres */
  --text-muted: #8a8a8a;                  /* meta / subtítulos */
  --text-soft: #555;                      /* historias / body */

  /* Header oscuro como franja de marca */
  --header-bg: #1c0b3b;
  --header-text: #ffffff;
  --header-muted: #b4a5d0;

  --danger: #ff5577;
  --sans: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
  /* Alias: antes era "handwritten" (Caveat). Ahora todo Nunito,
     con italic/peso para mantener jerarquía visual. */
  --display: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;

  /* Sombras más sutiles para tema claro */
  --shadow-card: 0 4px 20px rgba(28, 11, 59, 0.08);
  --shadow-card-hover: 0 20px 50px rgba(0, 216, 217, 0.18), 0 4px 15px rgba(28, 11, 59, 0.1);
  --shadow-glow: 0 0 30px rgba(0, 216, 217, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============ HEADER (franja oscura sobre body claro) ============ */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  background: var(--header-bg);
  color: var(--header-text);
  box-shadow: 0 4px 20px rgba(28, 11, 59, 0.15);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

/* Acento cyan en la parte superior del header para anclar la marca */
.app-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--secondary) 0%, var(--secondary-dim) 100%);
}

.brand { display: flex; align-items: center; gap: 16px; }

.brand-badge {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dim) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-glow);
  font-family: var(--sans);
  font-weight: 900; font-size: 1.9em; color: var(--primary);
  letter-spacing: -2px;
}

.brand-text h1 { font-size: 1.5em; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
.brand-text .accent { color: var(--secondary); }
.brand-text p {
  font-size: 0.7em;
  font-weight: 600;
  color: var(--secondary);
  margin-top: 6px;
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: 3px;
}

.header-actions { display: flex; gap: 12px; align-items: center; }

.view-toggle {
  display: inline-flex;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 999px;
  padding: 4px; gap: 2px;
}

.view-btn {
  padding: 10px 20px; border: none; background: transparent;
  color: var(--text-soft); font-family: var(--sans);
  font-weight: 700; font-size: 0.9em; border-radius: 999px;
  cursor: pointer; transition: all 0.25s ease;
  display: inline-flex; align-items: center; gap: 8px;
}

.view-toggle {
  /* toggle sobre header oscuro: píldora blanca con buena opacidad */
  background: rgba(255, 255, 255, 0.95);
}
.view-btn:hover { color: var(--text); background: rgba(28, 11, 59, 0.05); }
.view-btn.active {
  background: var(--secondary); color: var(--primary);
  box-shadow: 0 4px 20px rgba(0, 216, 217, 0.35);
}
.view-btn.active:hover { background: var(--secondary); }

.live-indicator {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--secondary-soft);
  border: 1px solid var(--secondary-border);
  border-radius: 999px;
  font-size: 0.8em; font-weight: 700;
  color: var(--secondary);
  text-transform: uppercase; letter-spacing: 1.5px;
}

.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--secondary);
  box-shadow: 0 0 12px var(--secondary);
  animation: pulse-dot 1.6s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

.view { display: none; padding: 40px; }
.view.active { display: block; }

/* ============ MURAL VIEW ============ */
.mural-hero { max-width: 1600px; margin: 0 auto 32px; text-align: center; padding: 20px 0; }
.mural-hero h2 {
  font-size: 2.8em; line-height: 1.05;
  color: var(--primary); font-weight: 900;
  letter-spacing: -1.5px;
}
.mural-hero h2 .accent { color: var(--secondary-dim); }
.mural-hero p { margin-top: 10px; font-size: 1em; color: var(--text-muted); font-weight: 500; }

/* Grid masonry con alturas variables vía JS */
.mural-grid {
  max-width: 1600px; margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  grid-auto-rows: 10px;
  grid-auto-flow: dense;
  gap: 24px;
}

@media (max-width: 768px) {
  .mural-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
}

.mural-card {
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s ease, box-shadow 0.3s ease;
  position: relative;
  align-self: start; /* la card mide lo que su contenido — nunca se estira al alto del grid track */
  transform: rotate(var(--rot, 0deg));
  transform-origin: center;
}

.mural-card:hover {
  transform: rotate(0deg) translateY(-6px) scale(1.02);
  border-color: var(--secondary-border);
  box-shadow: var(--shadow-card-hover);
  z-index: 5;
}

.mural-card.is-new {
  animation: dropIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.mural-card.is-new::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  box-shadow: 0 0 0 3px var(--secondary), 0 0 60px var(--secondary);
  animation: glowPulse 3s ease-out forwards;
  animation-delay: inherit;
  pointer-events: none;
}

@keyframes dropIn {
  0% {
    opacity: 0;
    transform: translateY(-150px) rotate(-8deg) scale(0.7);
  }
  50% {
    opacity: 1;
    transform: translateY(12px) rotate(2deg) scale(1.03);
  }
  75% {
    transform: translateY(-4px) rotate(-1deg) scale(0.99);
  }
  100% {
    opacity: 1;
    transform: translateY(0) rotate(var(--rot, 0deg)) scale(1);
  }
}

@keyframes glowPulse {
  0%   { opacity: 1; }
  70%  { opacity: 0.4; }
  100% { opacity: 0; }
}

.media-wrap {
  width: 100%; position: relative;
  background: var(--surface-deep);
  overflow: hidden;
  /* Sin aspect-ratio forzado: la imagen define el alto del contenedor.
     Así ni recortamos ni dejamos espacio vacío. */
}

.media-wrap img, .media-wrap video {
  width: 100%;
  height: auto;       /* ratio natural de la imagen — nada se recorta */
  display: block;
}

.media-wrap .media-placeholder {
  width: 100%;
  aspect-ratio: 1;    /* el placeholder sin imagen sí es cuadrado */
  display: flex; align-items: center; justify-content: center;
  font-family: var(--sans); font-size: 3em; font-weight: 900;
  color: var(--secondary-dim);
  background:
    linear-gradient(135deg, rgba(0, 216, 217, 0.15) 0%, rgba(28, 11, 59, 0.08) 100%),
    var(--surface-deep);
  letter-spacing: -2px;
}

.video-badge {
  position: absolute; top: 12px; right: 12px;
  padding: 6px 12px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  border-radius: 999px;
  color: var(--secondary);
  font-size: 0.75em; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  display: inline-flex; align-items: center; gap: 6px;
}

.card-content { padding: 16px 18px 18px; }

.quote {
  font-size: 1.05em; line-height: 1.35;
  color: var(--primary);
  font-weight: 700;
  font-style: italic;
  margin-bottom: 12px;
  position: relative;
  padding-left: 18px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.quote::before {
  content: '"';
  position: absolute; left: -2px; top: -18px;
  font-size: 2.4em; color: var(--secondary-dim); opacity: 0.9;
  font-family: Georgia, serif; font-weight: 700;
  font-style: normal;
  line-height: 1;
}

.person { margin-bottom: 10px; }
.person-name {
  font-weight: 800; font-size: 0.95em; color: var(--text);
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 3px 10px;
  background: var(--secondary-soft);
  border: 1px solid var(--secondary-border);
  color: var(--secondary-dim);
  border-radius: 999px;
  font-size: 0.68em; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
}
.chip.space {
  background: rgba(28, 11, 59, 0.06);
  border-color: rgba(28, 11, 59, 0.15);
  color: var(--primary);
}

/* .story solo visible en modal (donde se agrega la clase via modal-body .story) */
.mural-card .story { display: none; }

/* En modal y explore sí queremos la historia */
.modal-body .story,
.explore-grid .mural-card .story {
  display: -webkit-box;
  font-size: 0.92em; line-height: 1.55;
  color: var(--text-soft);
  -webkit-line-clamp: 4;
  line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-top: 12px;
}

/* ============ COLLAGE VIEW ============ */
.collage-hero { text-align: center; margin-bottom: 20px; padding: 10px 0; }
.collage-hero h2 {
  font-size: 2.2em; line-height: 1.05;
  color: var(--primary); font-weight: 900;
  letter-spacing: -1px;
}
.collage-hero p { margin-top: 8px; color: var(--text-muted); font-size: 0.95em; font-weight: 500; }

.collage-canvas {
  position: relative;
  max-width: 1800px;
  margin: 0 auto;
  height: calc(100vh - 240px);
  min-height: 560px;
  overflow: hidden;
  border-radius: 24px;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(0, 216, 217, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 60%, rgba(28, 11, 59, 0.05) 0%, transparent 55%),
    var(--surface-deep);
  border: 1px dashed rgba(28, 11, 59, 0.1);
}

.polaroid {
  position: absolute;
  width: 210px;
  background: #fefefe;
  padding: 14px 14px 16px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55), 0 4px 12px rgba(0, 0, 0, 0.4);
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  transition: box-shadow 0.3s ease;
  transform: rotate(var(--rot, 0deg));
  will-change: transform, left, top;
}

.polaroid:hover {
  box-shadow: 0 20px 60px rgba(0, 216, 217, 0.4), 0 4px 12px rgba(0, 0, 0, 0.4);
}

.polaroid.dragging {
  cursor: grabbing;
  transition: none;
  transform: rotate(0deg) scale(1.08);
  box-shadow: 0 30px 80px rgba(0, 216, 217, 0.5), 0 4px 12px rgba(0, 0, 0, 0.4);
}

.polaroid-media {
  position: relative;
  width: 100%; aspect-ratio: 1;
  background: #1a1a1a;
  overflow: hidden;
  pointer-events: none;  /* el drag siempre se maneja desde .polaroid */
}

.polaroid-media img,
.polaroid-media video,
.polaroid-media iframe {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  border: none;
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: none;
}

.polaroid-media .media-placeholder {
  width: 100%; height: 100%; aspect-ratio: auto;
  font-size: 3em;
}

.polaroid-media .video-badge {
  font-size: 0.65em; padding: 4px 8px;
  top: 8px; right: 8px;
}

.polaroid-caption {
  margin-top: 10px;
  color: #222;
  text-align: center;
  font-size: 0.85em;
  font-weight: 700;
  font-style: italic;
  line-height: 1.25;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
}

.polaroid-name {
  margin-top: 3px;
  font-family: var(--sans);
  font-size: 0.7em;
  color: #888;
  text-align: center;
  font-weight: 600;
  letter-spacing: 0.3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.polaroid.is-new {
  animation: flyIn 1.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes flyIn {
  0% {
    opacity: 0;
    transform: translate(var(--fly-x, 0), -120vh) rotate(720deg) scale(0.4);
  }
  75% {
    opacity: 1;
  }
  100% {
    opacity: 1;
    transform: translate(0, 0) rotate(var(--rot, 0deg)) scale(1);
  }
}

@media (max-width: 768px) {
  .polaroid { width: 150px; padding: 10px 10px 12px; }
  .polaroid-caption { font-size: 0.8em; }
  .collage-canvas { height: calc(100vh - 200px); }
  .collage-hero h2 { font-size: 1.8em; }
}

/* ============ EXPLORE VIEW ============ */
.explore-controls {
  max-width: 1400px; margin: 0 auto 32px;
  display: flex; flex-direction: column; gap: 20px;
}

.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 18px 22px 18px 60px;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 16px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 1em; font-weight: 500;
  transition: all 0.25s ease;
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap input:focus {
  outline: none;
  border-color: var(--secondary);
  box-shadow: 0 0 0 4px var(--secondary-soft);
}
.search-icon {
  position: absolute; left: 22px; top: 50%;
  transform: translateY(-50%);
  color: var(--secondary); font-size: 1.2em;
}

.filter-group { display: flex; flex-direction: column; gap: 10px; }
.filter-label {
  font-size: 0.75em; font-weight: 800;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--text-muted);
}
.filter-pills { display: flex; flex-wrap: wrap; gap: 8px; }

.pill {
  padding: 9px 18px;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 999px;
  color: var(--text-soft);
  font-family: var(--sans);
  font-weight: 700; font-size: 0.85em;
  cursor: pointer;
  transition: all 0.2s ease;
}
.pill:hover {
  background: rgba(0, 216, 217, 0.08);
  color: var(--secondary-dim);
  border-color: var(--secondary-border);
}
.pill.active {
  background: var(--secondary); color: var(--primary);
  border-color: var(--secondary);
  box-shadow: 0 4px 20px rgba(0, 216, 217, 0.3);
}
.pill.active:hover { background: var(--secondary); color: var(--primary); }

.explore-grid {
  max-width: 1400px; margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
}

.results-count {
  max-width: 1400px; margin: 0 auto 16px;
  color: var(--text-muted); font-weight: 600; font-size: 0.9em;
}
.results-count strong { color: var(--secondary); }

/* En explore, cards sin rotación ni grid-row spans raros */
.explore-grid .mural-card {
  grid-row: auto;
  transform: none;
}
.explore-grid .mural-card:hover {
  transform: translateY(-6px);
}

/* ============ STATE / EMPTY ============ */
.state {
  max-width: 600px; margin: 60px auto;
  text-align: center; padding: 60px 40px;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 24px;
}
.state-icon { font-size: 3.5em; color: var(--secondary); margin-bottom: 20px; display: inline-block; }
.state h3 { font-size: 1.5em; margin-bottom: 10px; color: var(--text); }
.state p { color: var(--text-muted); line-height: 1.6; }

.spinner {
  display: inline-block; width: 48px; height: 48px;
  border: 4px solid var(--secondary-soft);
  border-top-color: var(--secondary);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(10, 4, 24, 0.92);
  backdrop-filter: blur(14px);
  display: none;
  align-items: center; justify-content: center;
  padding: 24px; overflow-y: auto;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.25s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 24px;
  max-width: 780px; width: 100%; max-height: 92vh;
  overflow-y: auto; position: relative;
  box-shadow: 0 30px 80px rgba(28, 11, 59, 0.4), 0 0 60px rgba(0, 216, 217, 0.15);
  animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalIn {
  from { transform: translateY(30px) scale(0.96); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}

.modal-close {
  position: absolute; top: 18px; right: 18px; z-index: 2;
  width: 42px; height: 42px;
  border: none; border-radius: 50%;
  background: rgba(28, 11, 59, 0.85);
  color: #fff; font-size: 1.4em; font-weight: 700;
  cursor: pointer; transition: all 0.2s ease;
  line-height: 1; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-close:hover {
  background: var(--secondary); color: var(--primary);
  transform: rotate(90deg);
}

.modal-media {
  width: 100%; max-height: 420px;
  overflow: hidden;
  background: var(--surface-deep);
  display: flex; align-items: center; justify-content: center;
}
.modal-media img, .modal-media video, .modal-media iframe {
  width: 100%; max-height: 420px;
  object-fit: contain; border: none;
}

.modal-body { padding: 32px 36px 36px; }
.modal-body .quote {
  font-size: 1.6em; line-height: 1.25;
  padding-left: 28px; margin-bottom: 22px;
  -webkit-line-clamp: initial;
  line-clamp: initial;
  display: block;
  overflow: visible;
}
.modal-body .quote::before { font-size: 3em; top: -14px; left: 0; }
.modal-body .person-name { font-size: 1.4em; }
.modal-body .story {
  font-size: 1.02em; line-height: 1.7;
  color: var(--text-soft);
  -webkit-line-clamp: initial;
  line-clamp: initial;
  display: block;
  margin-top: 18px;
}

/* ============ ICONS ============ */
.icn {
  display: inline-block; width: 1em; height: 1em;
  vertical-align: -0.125em; fill: currentColor;
}

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--surface-deep); }
::-webkit-scrollbar-thumb { background: rgba(28, 11, 59, 0.3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(28, 11, 59, 0.5); }

@media (max-width: 768px) {
  .app-header { padding: 14px 18px; flex-wrap: wrap; }
  .brand-text h1 { font-size: 1.2em; }
  .brand-text p { font-size: 0.6em; letter-spacing: 2px; }
  .view-btn { padding: 8px 12px; font-size: 0.8em; }
  .view { padding: 24px 16px; }
  .mural-hero h2 { font-size: 2em; }
  .modal-body { padding: 24px 22px; }
  .modal-body .quote { font-size: 1.3em; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-badge">B</div>
    <div class="brand-text">
      <h1>Bitácora <span class="accent">Talento Tech</span></h1>
      <p>nuestras historias</p>
    </div>
  </div>

  <div class="header-actions">
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span>En vivo</span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="mural">
        <svg class="icn" viewBox="0 0 24 24"><path d="M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zM3 14h7v7H3v-7z"/></svg>
        Mural
      </button>
      <button class="view-btn" data-view="collage">
        <svg class="icn" viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h3.5l1 2H18a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5zm5 3-3 3h2v4h2v-4h2l-3-3zm6 2h3v2h-3v-2z"/></svg>
        Collage
      </button>
      <button class="view-btn" data-view="explore">
        <svg class="icn" viewBox="0 0 24 24"><path d="M10 18a8 8 0 1 1 5.3-2l4.4 4.3-1.4 1.4-4.3-4.4A8 8 0 0 1 10 18zm0-2a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"/></svg>
        Explorar
      </button>
    </div>
  </div>
</header>

<section id="view-mural" class="view active">
  <div class="mural-hero">
    <h2>Nuestras historias</h2>
    <p>Cada testimonio es parte del camino · se actualiza en tiempo real</p>
  </div>
  <div id="mural-container" class="mural-grid"></div>
</section>

<section id="view-collage" class="view">
  <div class="collage-hero">
    <h2>Collage colaborativo</h2>
    <p>Arrastra las historias · Click para ver el detalle · Las 20 más recientes</p>
  </div>
  <div id="collage-canvas" class="collage-canvas"></div>
</section>

<section id="view-explore" class="view">
  <div class="explore-controls">
    <div class="search-wrap">
      <span class="search-icon">
        <svg class="icn" viewBox="0 0 24 24"><path d="M10 18a8 8 0 1 1 5.3-2l4.4 4.3-1.4 1.4-4.3-4.4A8 8 0 0 1 10 18zm0-2a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"/></svg>
      </span>
      <input id="search-input" type="text" placeholder="Buscar por nombre, frase o historia…">
    </div>

    <div class="filter-group">
      <div class="filter-label">Región</div>
      <div class="filter-pills" id="filter-region"></div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Espacio</div>
      <div class="filter-pills" id="filter-space"></div>
    </div>
  </div>

  <div class="results-count" id="results-count"></div>
  <div id="explore-container" class="explore-grid"></div>
</section>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-media" id="modal-media"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbwSkTERa2yl8QJol6YGLfdO0abKpWpsVHmZkqRTx7shitLmr_DHjQYZlQgTqS5nl6Sh/exec',
  USE_MOCK: false,
  REFRESH_MS: 10_000,
  COLLAGE_MAX: 20,               // máximo de polaroids visibles en collage
  INITIAL_NEW_ANIMATION: true    // animar cards al cargar (para que se vea el efecto al refrescar)
};

// ============================================================
// STATE
// ============================================================
const state = {
  entries: [],
  seenIds: new Set(),          // IDs ya procesados (para no re-animar)
  currentView: 'mural',
  filters: { region: null, space: null, search: '' }
};

const collageState = {
  positions: new Map(),        // id → { x, y, rot }
  zTop: 10
};

// ============================================================
// HELPERS
// ============================================================
const REGIONS = ['Caldas', 'Quindío', 'Risaralda', 'Chocó', 'Antioquia'];
const SPACES = ['Bootcamp', 'Evento', 'Hackathon', 'Feria de empleabilidad', 'Otro'];

function getInitials(name) {
  if (!name) return 'TT';
  const parts = String(name).trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'TT';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function escapeHTML(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function extractDriveFileId(url) {
  if (!url) return null;
  const m = String(url).match(/(?:\/d\/|id=|\/file\/d\/)([a-zA-Z0-9_-]{20,})/);
  return m ? m[1] : null;
}

function hashId(id) {
  return String(id).split('').reduce((a, c) => a + c.charCodeAt(0), 0);
}

// ============================================================
// RENDER MEDIA con fallback chain:
//   lh3.googleusercontent.com → drive.google.com/thumbnail → iniciales
// El error listener global hace el swap.
// ============================================================
function renderMedia(entry, { forModal = false } = {}) {
  const initials = escapeHTML(getInitials(entry.nombre));
  const fileId = extractDriveFileId(entry.media_url);

  if (!entry.media_url) {
    return `<div class="media-placeholder">${initials}</div>`;
  }

  if (entry.media_type === 'video') {
    if (fileId) {
      return `<iframe src="https://drive.google.com/file/d/${fileId}/preview"
                      allow="autoplay" allowfullscreen
                      style="width:100%; aspect-ratio: 16/9; border:0;"></iframe>
              ${forModal ? '' : '<div class="video-badge">▶ Video</div>'}`;
    }
    return `<video src="${escapeHTML(entry.media_url)}"
                   ${forModal ? 'controls' : 'autoplay muted loop playsinline'}></video>
            ${forModal ? '' : '<div class="video-badge">▶ Video</div>'}`;
  }

  // Imagen con cadena de fallback
  if (fileId) {
    const primary = `https://lh3.googleusercontent.com/d/${fileId}=s1200`;
    const fallback = `https://drive.google.com/thumbnail?id=${fileId}&sz=w1200`;
    return `<img src="${primary}"
                 data-fallback="${fallback}"
                 data-initials="${initials}"
                 alt="${escapeHTML(entry.nombre || '')}"
                 loading="lazy">`;
  }

  return `<img src="${escapeHTML(entry.media_url)}"
               data-initials="${initials}"
               alt="${escapeHTML(entry.nombre || '')}"
               loading="lazy">`;
}

// Listener global de errores de imagen (captura phase para interceptar todo)
document.addEventListener('error', (e) => {
  const img = e.target;
  if (!(img instanceof HTMLImageElement)) return;

  // Paso 1: probar el fallback URL si existe y no se ha probado
  if (img.dataset.fallback && !img.dataset.triedFallback) {
    img.dataset.triedFallback = '1';
    img.src = img.dataset.fallback;
    return;
  }

  // Paso 2: reemplazar por placeholder de iniciales (solo una vez)
  if (img.dataset.replaced) return;
  img.dataset.replaced = '1';
  const initials = img.dataset.initials || 'TT';
  const div = document.createElement('div');
  div.className = 'media-placeholder';
  div.textContent = initials;
  if (img.parentNode) img.parentNode.replaceChild(div, img);
}, true);

// ============================================================
// FETCH
// ============================================================
async function fetchEntries() {
  if (CONFIG.USE_MOCK || !CONFIG.API_URL) return [];
  try {
    const res = await fetch(CONFIG.API_URL, { cache: 'no-store' });
    const json = await res.json();
    if (json.success && Array.isArray(json.data)) {
      return json.data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }
    console.warn('API sin success:', json);
    return state.entries;
  } catch (err) {
    console.error('Error al consultar API:', err);
    return state.entries;
  }
}

// ============================================================
// RENDER: MURAL con DOM diffing (sin re-render destructivo)
// ============================================================
function buildCardEl(entry, isNew, animDelayMs = 0) {
  const hash = hashId(entry.id);
  const rot = (((hash % 7) - 3) * 0.35).toFixed(2) + 'deg';  // -1.05° a 1.05°

  // La variedad visual ahora viene del ratio NATURAL de cada imagen,
  // no de ratios forzados. Cada card mide exactamente lo que mide su contenido.

  const el = document.createElement('article');
  el.className = 'mural-card' + (isNew ? ' is-new' : '');
  el.dataset.id = entry.id;
  el.style.setProperty('--rot', rot);
  if (animDelayMs > 0) el.style.animationDelay = animDelayMs + 'ms';

  // En mural: solo frase + nombre + chips (no historia, se ve en modal).
  // .story queda en el DOM pero hidden por CSS — así explore sí la muestra.
  el.innerHTML = `
    <div class="media-wrap">${renderMedia(entry)}</div>
    <div class="card-content">
      <p class="quote">${escapeHTML(entry.frase || '')}</p>
      <div class="person">
        <span class="person-name">${escapeHTML(entry.nombre || '')}</span>
      </div>
      <div class="chips">
        ${entry.region ? `<span class="chip">${escapeHTML(entry.region)}</span>` : ''}
        ${entry.espacio ? `<span class="chip space">${escapeHTML(entry.espacio)}</span>` : ''}
      </div>
      ${entry.historia ? `<p class="story">${escapeHTML(entry.historia)}</p>` : ''}
    </div>
  `;
  return el;
}

function renderMural() {
  const container = document.getElementById('mural-container');

  if (!state.entries.length) {
    container.innerHTML = `
      <div class="state" style="grid-column: 1/-1;">
        <div class="state-icon">✨</div>
        <h3>Pronto llegarán las primeras historias</h3>
        <p>Sé el primero en compartir tu experiencia en Talento Tech.</p>
      </div>`;
    return;
  }

  // Limpiar estado vacío si existe
  const emptyState = container.querySelector('.state');
  if (emptyState) container.innerHTML = '';

  const currentIds = new Set(state.entries.map(e => String(e.id)));

  // 1. Eliminar cards que ya no están
  container.querySelectorAll('.mural-card').forEach(card => {
    if (!currentIds.has(card.dataset.id)) {
      card.style.transition = 'opacity 0.4s, transform 0.4s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.8)';
      setTimeout(() => card.remove(), 400);
    }
  });

  // 2. Agregar nuevas (prepend para que las nuevas queden arriba)
  //    Con stagger si son varias en el mismo batch
  const existingIds = new Set(
    Array.from(container.querySelectorAll('.mural-card'))
      .map(c => c.dataset.id)
  );

  const toAdd = state.entries.filter(e => !existingIds.has(String(e.id)));

  toAdd.forEach((entry, i) => {
    // Animar solo las primeras 10 en un refresh cargado (evita saturación al refrescar la página).
    // Entradas nuevas individuales durante la sesión siempre animan.
    const isNew = i < 10;
    const delay = i * 120;
    const el = buildCardEl(entry, isNew, delay);
    container.insertBefore(el, container.firstChild);
    state.seenIds.add(String(entry.id));

    // Masonry después de que cargue el contenido
    requestAnimationFrame(() => setCardSpan(el));
    setTimeout(() => setCardSpan(el), 400);
    setTimeout(() => setCardSpan(el), 1500);

    // Re-layout preciso cuando la imagen real termine de cargar (o falle)
    const img = el.querySelector('.media-wrap img');
    if (img && !img.complete) {
      img.addEventListener('load', () => setCardSpan(el), { once: true });
      img.addEventListener('error', () => setCardSpan(el), { once: true });
    }
  });

  // 3. Reordenar para que coincida con state.entries (newest first)
  state.entries.forEach(entry => {
    const card = container.querySelector(`.mural-card[data-id="${CSS.escape(String(entry.id))}"]`);
    if (card) container.appendChild(card);
  });

  // Marcar todos como vistos
  state.entries.forEach(e => state.seenIds.add(String(e.id)));
}

function setCardSpan(card) {
  const gap = 24;
  const rowHeight = 10;
  const h = card.getBoundingClientRect().height;
  if (h <= 0) return;
  const span = Math.ceil((h + gap) / (rowHeight + gap));
  card.style.gridRow = `span ${span}`;
}

function relayoutAllMural() {
  document.querySelectorAll('#mural-container .mural-card').forEach(setCardSpan);
}

window.addEventListener('resize', () => {
  if (state.currentView === 'mural') relayoutAllMural();
});

// ============================================================
// RENDER: COLLAGE (polaroids + drag & drop)
// ============================================================
function getCollagePosition(id, canvasRect) {
  if (collageState.positions.has(id)) {
    return collageState.positions.get(id);
  }

  const cardW = 210, cardH = 280;
  const marginX = 30, marginY = 30;
  const maxX = Math.max(0, canvasRect.width - cardW - marginX * 2);
  const maxY = Math.max(0, canvasRect.height - cardH - marginY * 2);

  // Buscar la posición con mayor distancia mínima a las existentes (10 intentos)
  let best = null, bestScore = -1;
  for (let i = 0; i < 12; i++) {
    const x = Math.random() * maxX + marginX;
    const y = Math.random() * maxY + marginY;
    let minDist = Infinity;
    for (const p of collageState.positions.values()) {
      const d = Math.hypot(p.x - x, p.y - y);
      if (d < minDist) minDist = d;
    }
    if (minDist > bestScore) {
      bestScore = minDist;
      best = { x, y };
    }
  }

  const pos = {
    x: best ? best.x : marginX,
    y: best ? best.y : marginY,
    rot: (Math.random() * 16 - 8).toFixed(2)  // -8° a 8°
  };
  collageState.positions.set(id, pos);
  return pos;
}

function buildPolaroidEl(entry, pos, animate) {
  const el = document.createElement('article');
  el.className = 'polaroid' + (animate ? ' is-new' : '');
  el.dataset.id = entry.id;
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';
  el.style.setProperty('--rot', pos.rot + 'deg');
  el.style.zIndex = ++collageState.zTop;
  el.style.setProperty('--fly-x', (Math.random() > 0.5 ? 60 : -60) + 'vw');

  el.innerHTML = `
    <div class="polaroid-media">${renderMedia(entry)}</div>
    <div class="polaroid-caption">${escapeHTML(entry.frase || '')}</div>
    <div class="polaroid-name">${escapeHTML(entry.nombre || '')}</div>
  `;
  return el;
}

function setupPolaroidDrag(el) {
  // Pointer Events API con setPointerCapture:
  // el navegador enruta todos los eventos del puntero a este elemento
  // hasta que liberemos la captura. Resuelve los bugs de "se pega el mouse"
  // y de clicks sintéticos después de arrastrar.
  let startX, startY, startLeft, startTop, moved, activePointerId = null;

  const onPointerDown = (ev) => {
    // Solo botón principal del mouse (o toque)
    if (ev.pointerType === 'mouse' && ev.button !== 0) return;

    activePointerId = ev.pointerId;
    try { el.setPointerCapture(ev.pointerId); } catch (_) {}

    startX = ev.clientX;
    startY = ev.clientY;
    startLeft = parseFloat(el.style.left) || 0;
    startTop = parseFloat(el.style.top) || 0;
    moved = false;
    el.classList.add('dragging');
    el.style.zIndex = ++collageState.zTop;
    ev.preventDefault();
  };

  const onPointerMove = (ev) => {
    if (ev.pointerId !== activePointerId) return;
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;
    if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) moved = true;
    if (moved) {
      el.style.left = (startLeft + dx) + 'px';
      el.style.top = (startTop + dy) + 'px';
    }
  };

  const onPointerUp = (ev) => {
    if (ev.pointerId !== activePointerId) return;
    try { el.releasePointerCapture(ev.pointerId); } catch (_) {}
    el.classList.remove('dragging');
    activePointerId = null;

    const id = el.dataset.id;
    const pos = collageState.positions.get(id);
    if (pos && moved) {
      pos.x = parseFloat(el.style.left) || 0;
      pos.y = parseFloat(el.style.top) || 0;
    }
    // Click sin arrastrar → modal. Con arrastre → nada.
    if (!moved) openModal(id);
  };

  el.addEventListener('pointerdown', onPointerDown);
  el.addEventListener('pointermove', onPointerMove);
  el.addEventListener('pointerup', onPointerUp);
  el.addEventListener('pointercancel', onPointerUp);
  // Previene drag nativo del navegador (ghost image)
  el.addEventListener('dragstart', e => e.preventDefault());
}

function renderCollage() {
  const canvas = document.getElementById('collage-canvas');
  const entries = state.entries.slice(0, CONFIG.COLLAGE_MAX);
  const currentIds = new Set(entries.map(e => String(e.id)));

  // Eliminar polaroids que ya no están en el top N
  canvas.querySelectorAll('.polaroid').forEach(el => {
    if (!currentIds.has(el.dataset.id)) {
      el.style.transition = 'opacity 0.4s, transform 0.4s';
      el.style.opacity = '0';
      el.style.transform = 'scale(0.7) rotate(45deg)';
      const id = el.dataset.id;
      setTimeout(() => {
        el.remove();
        collageState.positions.delete(id);
      }, 400);
    }
  });

  const existingIds = new Set(
    Array.from(canvas.querySelectorAll('.polaroid')).map(el => el.dataset.id)
  );

  const rect = canvas.getBoundingClientRect();
  entries.forEach((entry, i) => {
    if (existingIds.has(String(entry.id))) return;
    const pos = getCollagePosition(String(entry.id), rect);
    const el = buildPolaroidEl(entry, pos, true);
    el.style.animationDelay = (i * 150) + 'ms';
    canvas.appendChild(el);
    setupPolaroidDrag(el);
  });
}

// Reposicionar si cambia el viewport (limpia posiciones fuera del canvas)
window.addEventListener('resize', () => {
  if (state.currentView !== 'collage') return;
  const canvas = document.getElementById('collage-canvas');
  const rect = canvas.getBoundingClientRect();
  canvas.querySelectorAll('.polaroid').forEach(el => {
    const x = parseFloat(el.style.left) || 0;
    const y = parseFloat(el.style.top) || 0;
    const maxX = rect.width - 220;
    const maxY = rect.height - 300;
    if (x > maxX || y > maxY) {
      const nx = Math.min(x, maxX);
      const ny = Math.min(y, maxY);
      el.style.left = Math.max(10, nx) + 'px';
      el.style.top = Math.max(10, ny) + 'px';
      const pos = collageState.positions.get(el.dataset.id);
      if (pos) { pos.x = Math.max(10, nx); pos.y = Math.max(10, ny); }
    }
  });
});

// ============================================================
// RENDER: EXPLORE
// ============================================================
function buildFilterPills(containerId, options, filterKey) {
  const container = document.getElementById(containerId);
  const all = `<button class="pill ${!state.filters[filterKey] ? 'active' : ''}" data-value="">Todos</button>`;
  const items = options.map(opt => `
    <button class="pill ${state.filters[filterKey] === opt ? 'active' : ''}" data-value="${escapeHTML(opt)}">
      ${escapeHTML(opt)}
    </button>
  `).join('');
  container.innerHTML = all + items;

  container.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.value;
      state.filters[filterKey] = v || null;
      buildFilterPills(containerId, options, filterKey);
      renderExplore();
    });
  });
}

function applyFilters(entries) {
  const { region, space, search } = state.filters;
  const q = search.toLowerCase().trim();
  return entries.filter(e => {
    if (region && e.region !== region) return false;
    if (space && e.espacio !== space) return false;
    if (q) {
      const hay = `${e.nombre || ''} ${e.frase || ''} ${e.historia || ''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderExplore() {
  const container = document.getElementById('explore-container');
  const countEl = document.getElementById('results-count');
  const filtered = applyFilters(state.entries);

  countEl.innerHTML = `<strong>${filtered.length}</strong> de ${state.entries.length} historias`;

  if (!filtered.length) {
    container.innerHTML = `
      <div class="state" style="grid-column: 1/-1;">
        <div class="state-icon">🔍</div>
        <h3>Sin resultados</h3>
        <p>Prueba con otros filtros o términos de búsqueda.</p>
      </div>`;
    return;
  }

  // Explore sí puede hacer re-render completo (menos crítico, no hay animaciones persistentes)
  container.innerHTML = '';
  filtered.forEach(entry => {
    const el = buildCardEl(entry, false);
    el.style.gridRow = 'auto';  // explore no usa masonry
    container.appendChild(el);
  });
}

// ============================================================
// MODAL
// ============================================================
function openModal(id) {
  const entry = state.entries.find(e => String(e.id) === String(id));
  if (!entry) return;

  document.getElementById('modal-media').innerHTML = renderMedia(entry, { forModal: true });
  document.getElementById('modal-body').innerHTML = `
    <p class="quote">${escapeHTML(entry.frase || '')}</p>
    <div class="person"><span class="person-name">${escapeHTML(entry.nombre || '')}</span></div>
    <div class="chips">
      ${entry.region ? `<span class="chip">${escapeHTML(entry.region)}</span>` : ''}
      ${entry.espacio ? `<span class="chip space">${escapeHTML(entry.espacio)}</span>` : ''}
    </div>
    ${entry.historia ? `<p class="story">${escapeHTML(entry.historia)}</p>` : ''}
  `;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ============================================================
// VIEW TOGGLE
// ============================================================
function switchView(name) {
  state.currentView = name;
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === name);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');

  if (name === 'explore') renderExplore();
  else if (name === 'collage') renderCollage();
  else if (name === 'mural') {
    renderMural();
    requestAnimationFrame(relayoutAllMural);
  }
}

// ============================================================
// REFRESH LOOP
// ============================================================
async function refresh() {
  const data = await fetchEntries();
  state.entries = data;
  if (state.currentView === 'mural') renderMural();
  else if (state.currentView === 'collage') renderCollage();
  else renderExplore();
}

// ============================================================
// INIT
// ============================================================
function init() {
  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  // Search
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.filters.search = e.target.value;
      renderExplore();
    }, 200);
  });

  // Filter pills
  buildFilterPills('filter-region', REGIONS, 'region');
  buildFilterPills('filter-space', SPACES, 'space');

  // Click delegado para cards del mural y explore (no para polaroids, ellas manejan su propio click)
  document.body.addEventListener('click', e => {
    const card = e.target.closest('.mural-card');
    if (card) openModal(card.dataset.id);
  });

  // Modal
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // Re-layout masonry cuando fuentes/imágenes cargan
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => relayoutAllMural());
  }

  refresh();
  setInterval(refresh, CONFIG.REFRESH_MS);
}

init();
</script>
</body>
</html>
